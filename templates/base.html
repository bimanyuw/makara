{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_appearance.site_title }}</title>

    <link rel="stylesheet" href="{% static 'css/custom.css' %}">

    <style>
        :root {
            --primary-color: #2563eb;
            --background-color: #ffffff;
            --text-color: #1e293b;
            --muted-color: #64748b;
            --border-color: #dbeafe;
            --card-border: #e2e8f0;
            --font-family: Arial, sans-serif;
            --radius: 10px;
            --shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-family, Arial, sans-serif);
            background-color: var(--background-color, #ffffff);
            color: var(--text-color);
            line-height: 1.6;
        }

        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid var(--card-border);
        }

        .navbar-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .nav-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-text {
            font-size: 0.95rem;
            color: var(--muted-color);
        }

        .container {
            max-width: 1000px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }

        h1, h2, h3 {
            margin-top: 0;
            color: #0f172a;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        p {
            margin-top: 0;
            color: var(--muted-color);
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid var(--primary-color);
            background-color: var(--primary-color);
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn:hover {
            opacity: 0.92;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--primary-color);
        }

        form p {
            margin-bottom: 16px;
        }

        form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #334155;
        }

        form input[type="text"],
        form input[type="email"],
        form input[type="url"],
        form input[type="color"],
        form select,
        form textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #ffffff;
            color: #0f172a;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        form textarea {
            min-height: 100px;
            resize: vertical;
        }

        .text-center {
            text-align: center;
        }

        @media (max-width: 768px) {
            .navbar-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .container {
                padding: 0 16px;
                margin: 24px auto;
            }

            .card {
                padding: 18px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body style="
    --primary-color: {{ site_appearance.primary_color }};
    --background-color: {{ site_appearance.background_color }};
    --font-family: {{ site_appearance.font_family }};
">
    <header class="navbar">
        <div class="navbar-inner">
            <div class="site-title">{{ site_appearance.site_title }}</div>

            <div class="nav-area">
                {% if user.is_authenticated %}
                    <span class="nav-text">{{ user.email }}</span>
                    <a href="/accounts/logout/" class="btn btn-secondary">Logout</a>
                {% else %}
                    <a href="/accounts/google/login/" class="btn">Login dengan Google</a>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
